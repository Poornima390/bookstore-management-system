<!DOCTYPE html>
<html>
<head>
    <title>Invoice</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body onload="window.print()">

<div class="container mt-5">
    <h2>Bookstore Invoice</h2>
    <hr>

    <p><strong>Customer:</strong> {{ bill.customer_name }}</p>
    <p><strong>Phone:</strong> {{ bill.phone }}</p>
    <p><strong>Date:</strong> {{ bill.bill_date }}</p>

    <table class="table table-bordered mt-4">
        <thead>
            <tr>
                <th>Book</th>
                <th>Quantity</th>
                <th>Price</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody>
            {% for item in items %}
            <tr>
                <td>{{ item.book_title }}</td>
                <td>{{ item.quantity }}</td>
                <td>{{ item.price }}</td>
                <td>{{ item.total }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <h4 class="text-end">Grand Total: ₹ {{ bill.total_amount }}</h4>

</div>

</body>
</html>

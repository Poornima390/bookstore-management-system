{% extends "base.html" %}
{% block content %}

<h2>Edit Book</h2>

<div class="card p-4 shadow">
    <form method="POST" action="/update_book/{{ book.id }}">
        <div class="mb-3">
            <label>Title</label>
            <input type="text" name="title" value="{{ book.title }}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Author</label>
            <input type="text" name="author" value="{{ book.author }}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Price</label>
            <input type="number" name="price" value="{{ book.price }}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Stock</label>
            <input type="number" name="stock" value="{{ book.stock }}" class="form-control" required>
        </div>

        <button class="btn btn-success">Update Book</button>
        <a href="/books" class="btn btn-secondary">Cancel</a>
    </form>
</div>

{% endblock %}

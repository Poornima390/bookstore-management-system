
<!DOCTYPE html>
<html>
<head>
    <title>Staff Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
        }

        .sidebar {
            width: 230px;
            height: 100vh;
            position: fixed;
            background: #1e293b;
            padding-top: 20px;
        }

        .sidebar h4 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 12px 20px;
            text-decoration: none;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #334155;
        }

        .content {
            margin-left: 230px;
            padding: 30px;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h4>📚 Book Store</h4>

    <a href="/dashboard">📊 Dashboard</a>
    <a href="/generate_bill">🧾 Generate Bill</a>
    <a href="#" onclick="confirmLogout()">🚪 Logout</a>
</div>

<div class="content">

<h2>Staff Dashboard</h2>
<hr>

<div class="row g-4">

<div class="col-md-6 col-lg-3">
<div class="card shadow p-4 text-center">
<h4>Sales Today</h4>
<h2>₹{{ sales_today }}</h2>
</div>
</div>

<div class="col-md-6 col-lg-3">
<div class="card shadow p-4 text-center">
<h4>Bills Today</h4>
<h2>{{ bills_today }}</h2>
</div>
</div>

<div class="col-md-6 col-lg-3">
<div class="card shadow p-4 text-center">
<h4>Books Available</h4>
<h2>{{ total_books }}</h2>
</div>
</div>

<div class="col-md-6 col-lg-3">
<div class="card shadow p-4 text-center">
<h4>Low Stock</h4>
<h2>{{ low_stock }}</h2>
</div>
</div>

</div>




<div class="card shadow p-4 mt-5">
<h4>Today's Sales Trend</h4>

<canvas id="salesChart"></canvas>

</div>

</div>

<script>
function confirmLogout() {
    if (confirm("Are you sure you want to logout?")) {
        window.location.href = "/logout";
    }
}
</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
new Chart(
document.getElementById('salesChart'),
{
type:'line',
data:{
labels:{{ months|tojson }},
datasets:[{
label:'Sales',
data:{{ sales|tojson }},
fill:false
}]
}
}
);
</script>
</body>
</html>

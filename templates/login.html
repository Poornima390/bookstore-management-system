<!DOCTYPE html>
<html>
<head>
    <title>Bookstore Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1e293b, #334155);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            width: 480px;
            padding: 35px;
            border-radius: 20px;
            background: white;
        }

        .role-card {
            border: 2px solid #ddd;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .role-card:hover {
            transform: scale(1.03);
        }

        .role-card.selected {
            border-color: #0d6efd;
            background: #e7f1ff;
        }

        .role-img {
            width: 70px;
            height: 70px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .logo {
            font-size: 40px;
        }
    </style>
</head>

<body>

<div class="card login-card shadow-lg">

    <div class="text-center mb-4">
        <div class="logo">📚</div>
        <h3>Bookstore Login</h3>
    </div>

    <!-- Flash Message -->
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger text-center">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">

        <label class="form-label">Select Role</label>

        <div class="row mb-4">

            <!-- Admin Card -->
            <div class="col-6">
                <div class="role-card" onclick="selectRole('admin')">
                    <img src="https://cdn-icons-png.flaticon.com/512/9131/9131529.png" class="role-img">
                    <h6>Admin</h6>
                    <input type="radio" name="role" value="admin" id="admin" hidden required>
                </div>
            </div>

            <!-- Staff Card -->
            <div class="col-6">
                <div class="role-card" onclick="selectRole('staff')">
                    <img src="https://cdn-icons-png.flaticon.com/512/2942/2942813.png" class="role-img">
                    <h6>Staff</h6>
                    <input type="radio" name="role" value="staff" id="staff" hidden required>
                </div>
            </div>

        </div>

        <div class="mb-3">
            <input type="text" name="username" class="form-control" placeholder="Username" required>
        </div>

        <div class="mb-3">
            <input type="password" name="password" class="form-control" placeholder="Password" required>
        </div>

        <button class="btn btn-dark w-100">Login</button>

    </form>

</div>

<script>
    function selectRole(role) {
        // Remove selected class from all
        document.querySelectorAll('.role-card').forEach(card => {
            card.classList.remove('selected');
        });

        // Add selected class to clicked
        if (role === 'admin') {
            document.getElementById('admin').checked = true;
            document.querySelectorAll('.role-card')[0].classList.add('selected');
        } else {
            document.getElementById('staff').checked = true;
            document.querySelectorAll('.role-card')[1].classList.add('selected');
        }
    }
</script>

</body>
</html>
